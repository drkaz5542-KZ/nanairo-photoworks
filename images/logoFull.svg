<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" font-family="Georgia, 'Times New Roman', serif">

  <!-- N mark: centered, top -->
  <!-- Left vertical -->
  <line x1="65" y1="88" x2="65" y2="25" stroke="#846f68" stroke-width="7" stroke-linecap="round"/>
  <!-- Diagonal -->
  <line x1="65" y1="25" x2="135" y2="88" stroke="#846f68" stroke-width="5" stroke-linecap="round"/>
  <!-- Right vertical -->
  <line x1="135" y1="88" x2="135" y2="25" stroke="#846f68" stroke-width="7" stroke-linecap="round"/>

  <!-- Botanical: stem from top-left of N -->
  <path d="M65 25 C63 19 60 13 61 9" stroke="#b08878" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Left leaf -->
  <path d="M61 9 C55 5 51 12 56 16 C59 13 61 9Z" fill="#b08878"/>
  <!-- Right petal -->
  <path d="M61 9 C64 4 70 7 66 13 C63 11 61 9Z" fill="#b08878"/>

  <!-- NANAIRO -->
  <text x="100" y="128" text-anchor="middle" font-size="30" letter-spacing="3" fill="#846f68">NANAIRO</text>

  <!-- PHOTO WORKS -->
  <text x="100" y="156" text-anchor="middle" font-size="11" letter-spacing="6" fill="#846f68">PHOTO WORKS</text>

</svg>
