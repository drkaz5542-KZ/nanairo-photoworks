<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark warm background -->
  <rect width="100" height="100" fill="#2a2320" rx="14"/>

  <!-- N: left vertical -->
  <line x1="23" y1="78" x2="23" y2="23" stroke="#f0e8e0" stroke-width="8" stroke-linecap="round"/>
  <!-- N: diagonal -->
  <line x1="23" y1="23" x2="77" y2="78" stroke="#f0e8e0" stroke-width="5.5" stroke-linecap="round"/>
  <!-- N: right vertical -->
  <line x1="77" y1="78" x2="77" y2="23" stroke="#f0e8e0" stroke-width="8" stroke-linecap="round"/>

  <!-- Botanical: stem curving up from top-left of N -->
  <path d="M23 23 C21 17 18 12 19 8" stroke="#c4a898" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Left leaf -->
  <path d="M19 8 C13 4 9 11 14 15 C17 12 19 8Z" fill="#c4a898"/>
  <!-- Right petal -->
  <path d="M19 8 C22 3 28 6 24 12 C21 10 19 8Z" fill="#c4a898"/>
</svg>
