<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お客様の声 | Nanairo Photoworks</title>
<meta name="description" content="七彩 Photo Worksにてニューボーン・マタニティ・ファミリーフォトを撮影されたお客様の声をご紹介します。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Shippori+Mincho:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --color-bg: #faf7f2;
    --color-bg-alt: #f2ece3;
    --color-text: #3a332c;
    --color-text-soft: #6b5f54;
    --color-accent: #a88968;
    --color-accent-dark: #8a6e4f;
    --color-line: #e2d8ca;
    --font-serif-en: 'EB Garamond', serif;
    --font-serif-jp: 'Shippori Mincho', serif;
    --max-width: 1200px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-serif-jp);
    color: var(--color-text);
    background: var(--color-bg);
    line-height: 1.8;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
  }
  img { max-width: 100%; display: block; }
  a { color: inherit; text-decoration: none; transition: opacity 0.3s ease; }
  a:hover { opacity: 0.7; }

  /* ===== Header ===== */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 1.25rem 2rem;
    background: rgba(250, 247, 242, 0.92);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid transparent;
    transition: border-color 0.3s ease, padding 0.3s ease;
  }
  header.scrolled { border-bottom-color: var(--color-line); padding: 0.9rem 2rem; }
  .nav-inner {
    max-width: var(--max-width);
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand { font-family: var(--font-serif-jp); font-size: 1.1rem; font-weight: 500; letter-spacing: 0.1em; }
  .brand rt { font-size: 0.55em; letter-spacing: 0.05em; font-weight: 400; }
  nav ul { list-style: none; display: flex; gap: 2.25rem; }
  nav a { font-family: var(--font-serif-en); font-size: 0.78rem; letter-spacing: 0.2em; color: var(--color-text); text-transform: uppercase; }
  nav a.current { color: var(--color-accent); }
  .menu-toggle { display: none; background: none; border: none; cursor: pointer; width: 32px; height: 24px; position: relative; }
  .menu-toggle span { position: absolute; left: 0; right: 0; height: 1px; background: var(--color-text); transition: all 0.3s ease; }
  .menu-toggle span:nth-child(1) { top: 4px; }
  .menu-toggle span:nth-child(2) { top: 12px; }
  .menu-toggle span:nth-child(3) { top: 20px; }
  .menu-toggle.open span:nth-child(1) { top: 12px; transform: rotate(45deg); }
  .menu-toggle.open span:nth-child(2) { opacity: 0; }
  .menu-toggle.open span:nth-child(3) { top: 12px; transform: rotate(-45deg); }

  /* ===== Btn ===== */
  .btn {
    display: inline-block;
    padding: 1rem 2.5rem;
    font-family: var(--font-serif-en);
    font-size: 0.9rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    border: 1px solid currentColor;
    background: transparent;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .btn-filled { background: var(--color-accent); color: #fff; border-color: var(--color-accent); }
  .btn-filled:hover { background: var(--color-accent-dark); border-color: var(--color-accent-dark); color: #fff; opacity: 1; }

  /* ===== Page Hero ===== */
  .page-hero {
    padding: 130px 2rem 5rem;
    background: var(--color-bg);
    text-align: center;
  }
  .section-eyebrow {
    font-family: var(--font-serif-en);
    font-size: 0.85rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--color-accent);
    margin-bottom: 1rem;
  }
  .section-title {
    font-family: var(--font-serif-en);
    font-size: clamp(2rem, 4vw, 2.8rem);
    font-weight: 400;
    margin-bottom: 1rem;
    letter-spacing: 0.02em;
  }
  .section-subtitle {
    color: var(--color-text-soft);
    max-width: 640px;
    margin: 0 auto;
    font-size: 0.95rem;
  }

  /* ===== Reviews Section ===== */
  .reviews-section {
    padding: 3rem 2rem 7rem;
    background: var(--color-bg);
  }
  .container { max-width: var(--max-width); margin: 0 auto; }

  /* Rating Summary */
  .rating-summary {
    text-align: center;
    margin-bottom: 4rem;
  }
  .rating-score-wrap {
    display: inline-flex;
    align-items: center;
    gap: 1.5rem;
    background: var(--color-bg-alt);
    padding: 1.5rem 3rem;
    border: 1px solid var(--color-line);
  }
  .rating-number {
    font-family: var(--font-serif-en);
    font-size: 4rem;
    font-weight: 400;
    color: var(--color-text);
    line-height: 1;
  }
  .rating-right { text-align: left; }
  .rating-stars { color: var(--color-accent); font-size: 1.3rem; letter-spacing: 0.1em; margin-bottom: 0.25rem; }
  .rating-count { font-size: 0.85rem; color: var(--color-text-soft); letter-spacing: 0.1em; }

  /* Reviews Grid */
  .reviews-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2rem;
  }
  .review-card {
    background: var(--color-bg-alt);
    padding: 2rem 1.75rem;
    position: relative;
    display: flex;
    flex-direction: column;
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .review-card.visible { opacity: 1; transform: translateY(0); }
  .review-card::before {
    content: '\201C';
    position: absolute;
    top: 10px; left: 18px;
    font-family: var(--font-serif-en);
    font-size: 4.5rem;
    line-height: 1;
    color: var(--color-accent);
    opacity: 0.25;
  }
  .review-stars { color: var(--color-accent); font-size: 0.9rem; letter-spacing: 0.1em; margin-bottom: 0.75rem; position: relative; z-index: 1; }
  .plan-badge {
    display: inline-block;
    font-family: var(--font-serif-en);
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--color-accent);
    border: 1px solid var(--color-accent);
    padding: 0.2rem 0.6rem;
    margin-bottom: 1rem;
    position: relative;
    z-index: 1;
  }
  .review-text {
    font-size: 0.88rem;
    color: var(--color-text-soft);
    line-height: 2;
    flex: 1;
    position: relative;
    z-index: 1;
  }
  .review-author {
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--color-line);
    font-family: var(--font-serif-en);
    font-style: italic;
    color: var(--color-accent);
    font-size: 0.9rem;
  }

  /* CTA */
  .reviews-cta {
    text-align: center;
    padding: 4rem 2rem;
    background: var(--color-bg-alt);
  }
  .reviews-cta p {
    color: var(--color-text-soft);
    margin-bottom: 2rem;
    font-size: 0.95rem;
  }

  /* ===== Footer ===== */
  footer {
    background: #3a332c;
    color: #d6cfc5;
    padding: 4rem 2rem 2rem;
    text-align: center;
  }
  .footer-brand { font-family: var(--font-serif-jp); font-size: 1.8rem; letter-spacing: 0.15em; color: #fff; margin-bottom: 0.5rem; }
  .footer-brand rt { font-size: 0.5em; letter-spacing: 0.05em; opacity: 0.8; }
  .footer-social { display: flex; justify-content: center; gap: 1.5rem; margin: 2rem 0; }
  .footer-social a {
    width: 40px; height: 40px;
    border: 1px solid #6b5f54;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #d6cfc5;
    transition: all 0.3s ease;
  }
  .footer-social a:hover { background: var(--color-accent); border-color: var(--color-accent); color: #fff; opacity: 1; }
  .footer-social svg { width: 18px; height: 18px; }
  .copyright { font-family: var(--font-serif-en); font-size: 0.8rem; letter-spacing: 0.2em; opacity: 0.6; padding-top: 2rem; border-top: 1px solid #5a5148; margin-top: 2rem; }

  /* ===== Responsive ===== */
  @media (max-width: 900px) {
    nav ul {
      position: fixed; top: 60px; left: 0; right: 0;
      background: rgba(250, 247, 242, 0.98);
      backdrop-filter: blur(10px);
      flex-direction: column; padding: 2rem; gap: 1.5rem;
      transform: translateY(-120%);
      transition: transform 0.4s ease;
      border-bottom: 1px solid var(--color-line);
    }
    nav ul.open { transform: translateY(0); }
    nav a { font-size: 1rem; letter-spacing: 0.08em; font-family: var(--font-serif-jp); }
    .menu-toggle { display: block; }
    .page-hero { padding: 100px 1.5rem 3rem; }
    .reviews-section { padding: 3rem 1.5rem 5rem; }
    .reviews-grid { grid-template-columns: repeat(2, 1fr); }
    .rating-score-wrap { padding: 1.25rem 2rem; }
  }
  @media (max-width: 500px) {
    .reviews-grid { grid-template-columns: 1fr; }
    .page-hero { padding: 90px 1.25rem 2.5rem; }
  }
</style>
</head>
<body>

<!-- ===== Header ===== -->
<header id="header">
  <div class="nav-inner">
    <a href="index.html" class="brand"><ruby>七彩<rt>なないろ</rt></ruby> Photo Works</a>
    <button class="menu-toggle" id="menuToggle" aria-label="menu">
      <span></span><span></span><span></span>
    </button>
    <nav>
      <ul id="navMenu">
        <li><a href="index.html#concept">About Me</a></li>
        <li><a href="index.html#services">料金・プラン</a></li>
        <li><a href="index.html#gallery">ギャラリー</a></li>
        <li><a href="index.html#process">撮影の流れ</a></li>
        <li><a href="reviews.html" class="current">お客様の声</a></li>
        <li><a href="index.html#contact">ご予約・お問い合わせ</a></li>
      </ul>
    </nav>
  </div>
</header>

<!-- ===== Page Hero ===== -->
<div class="page-hero">
  <div class="section-eyebrow">Voice</div>
  <h1 class="section-title">お客様の声</h1>
  <p class="section-subtitle">撮影を通じて、たくさんのご家族と素敵な時間を過ごさせていただいています。</p>
</div>

<!-- ===== Reviews ===== -->
<section class="reviews-section">
  <div class="container">

    <div class="rating-summary">
      <div class="rating-score-wrap">
        <span class="rating-number">4.8</span>
        <div class="rating-right">
          <div class="rating-stars">★★★★★</div>
          <div class="rating-count">41件の口コミ平均</div>
        </div>
      </div>
    </div>

    <div class="reviews-grid" id="reviewsGrid"></div>

  </div>
</section>

<!-- ===== CTA ===== -->
<div class="reviews-cta">
  <p>ご予約・お問い合わせはLINE公式アカウントよりお気軽にどうぞ</p>
  <a href="https://lin.ee/pyeHEsZ" target="_blank" class="btn btn-filled">公式LINEで予約・相談する</a>
</div>

<!-- ===== Footer ===== -->
<footer>
  <div class="footer-brand"><ruby>七彩<rt>なないろ</rt></ruby> Photo Works</div>
  <div class="footer-social">
    <a href="#" aria-label="Instagram">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor"/></svg>
    </a>
    <a href="#" aria-label="Facebook">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 8h3V4h-3a4 4 0 00-4 4v2H7v4h3v8h4v-8h3l1-4h-4V8a1 1 0 011-1z"/></svg>
    </a>
    <a href="#" aria-label="Mail">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 7l9 6 9-6M3 7v10a2 2 0 002 2h14a2 2 0 002-2V7M3 7a2 2 0 012-2h14a2 2 0 012 2"/></svg>
    </a>
  </div>
  <div class="copyright">&copy; 2026 七彩 Photo Works. All Rights Reserved.</div>
</footer>

<script>
  // ===== 口コミデータ =====
  // 新しい口コミはここに追加するだけでOKです
  const reviews = [
    {
      name: "口コミ1",
      prefecture: "",
      plan: "Newborn",
      stars: 5,
      text: "こちら側の都合で希望の日程のご相談をさせていただきましたが、無理を言ったにも関わらず調整してくださって本当にありがたかったです！一生に一度のニューボーンフォトということで出来るだけ良いものが撮れるようにと常に考えてくださっていて、撮る前から七彩Photo Works様にお願いして良かったなと思いました。撮影中も色んなパターンをカメラマン様側からご提案していただいたので、スムーズに沢山の可愛い写真を撮ることが出来ました。"
    },
    {
      name: "口コミ2",
      prefecture: "",
      plan: "",
      stars: 5,
      text: "撮影前に撮影のための段取りを懇切丁寧に教えていただけたため当日を安心して迎えることができました。当日の撮影パターンはおまかせでお願いしました。撮影セットの小物も可愛いものがたくさんありました。全カットとてもセンスがよくカットが変わるたびに旦那と2人で「かわいい♡」の連発！撮影のために準備した命名書や結婚指輪、エコー写真もすごく素敵な写真に残してもらいました。もし次の機会があればまたぜひお願いしたいと思います。"
    },
    {
      name: "口コミ3",
      prefecture: "和歌山県",
      plan: "",
      stars: 5,
      text: "丁寧で話しやすいカメラマンさんでした！いろんな道具で撮影してくれてこうしたら可愛いなど工夫してくださってたのが好印象でした。衣装も荷物になるのに全部持って来てくださったり、いろんな提案してくださったりしてとてもいい時間を過ごさせていただきました。またお願いするタイミングが出来たら次もお願いしたいなと思いました♡撮影に関しては大変満足でした！主人と2人で出来上がりを楽しみにしております。この度はありがとうございました！"
    },
    {
      name: "口コミ4",
      prefecture: "大阪府",
      plan: "Newborn",
      stars: 5,
      text: "ニューボーンフォトありがとうございました！新生児期だけの特別な写真を記念に残せて、大満足です！上の子がグズグズになってしまっても、根気よく声をかけてくださったり、本当に丁寧に接していただき、とても助かりました。感謝です。時間もちょうど良く、上の子もベビーも無理のないスケジュールでした。今後も、また子ども達の記念日などで撮影をお願い出来たらなぁ…そんなプランができる日を楽しみにしています！"
    },
    {
      name: "口コミ5",
      prefecture: "大阪府",
      plan: "Maternity",
      stars: 5,
      text: "上の子の時に憧れていたものの、入院などのトラブルが重なり、泣く泣く断念したマタニティフォト。今回、念願叶いました！プロの手で撮影していただけて本当に本当に一生の思い出になりました。とても嬉しかったです。大きなおなかだけではなく、大切な家族との【今】を記念に残せたこと、本当に良かったです！何年経っても、【この瞬間】を思い返せる１枚１枚だと感じました。撮影中に調子を崩してしまいましたが「焦らないで大丈夫ですよ」など優しく声をかけてくださり、時間優先ではなく私の体調に合わせて最後まで撮影していただけたこと、感謝の想いでいっぱいです。ありがとうございました。"
    },
    {
      name: "口コミ6",
      prefecture: "大阪府",
      plan: "Newborn",
      stars: 5,
      text: "本日は可愛い写真をありがとうございました。1人目はコロナ禍での出産でニューボーンフォトを撮れていなかったので、今回2人目だけ撮るのはどうしようかと悩んでいたのですが、兄弟の写真をとっても素敵に撮って頂き、兄になった長男にとっても次男にとっても素敵な思い出を残せたのでお願いして良かったです。とっても可愛い帽子や小物で、おくるみもとても慣れた様子で巻いて頂き、安心してお任せ出来ました。おくるみがお腹の中を思い出したのか撮影中とてもスヤスヤ気持ち良さそうに眠っていました。データが届くのもとても楽しみです。ありがとうございました！"
    }
  ];

  const planLabels = { Newborn: 'Newborn', Maternity: 'Maternity', Family: 'Family' };

  function renderStars(n) {
    return '★'.repeat(n) + '☆'.repeat(5 - n);
  }

  // カード描画
  const grid = document.getElementById('reviewsGrid');
  reviews.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'review-card';
    card.style.transitionDelay = (i % 3) * 0.1 + 's';
    const author = [r.name, r.prefecture].filter(Boolean).join(' · ');
    card.innerHTML = `
      <div class="review-stars">${renderStars(r.stars)}</div>
      ${r.plan ? `<span class="plan-badge">${planLabels[r.plan] || r.plan}</span>` : ''}
      <p class="review-text">${r.text}</p>
      <div class="review-author">— ${author}</div>
    `;
    grid.appendChild(card);
  });

  // Reveal on scroll
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
  }, { threshold: 0.1 });
  document.querySelectorAll('.review-card').forEach(el => observer.observe(el));

  // Header scroll
  const header = document.getElementById('header');
  window.addEventListener('scroll', () => { header.classList.toggle('scrolled', window.scrollY > 40); });

  // Mobile menu
  const toggle = document.getElementById('menuToggle');
  const navMenu = document.getElementById('navMenu');
  toggle.addEventListener('click', () => { toggle.classList.toggle('open'); navMenu.classList.toggle('open'); });
  navMenu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => { toggle.classList.remove('open'); navMenu.classList.remove('open'); }));
</script>

</body>
</html>
