<style>
  :root {
    --color-bg: #faf7f2;
    --color-bg-alt: #f2ece3;
    --color-text: #3a332c;
    --color-text-soft: #6b5f54;
    --color-accent: #a88968;
    --color-accent-dark: #8a6e4f;
    --color-line: #e2d8ca;
    --font-serif-en: 'EB Garamond', serif;
    --font-serif-jp: 'Shippori Mincho', serif;
    --max-width: 1200px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-serif-jp);
    color: var(--color-text);
    background: var(--color-bg);
    line-height: 1.8;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
  }
  img { max-width: 100%; display: block; }
  a { color: inherit; text-decoration: none; transition: opacity 0.3s ease; }
  a:hover { opacity: 0.7; }

  /* ===== Header ===== */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 1.25rem 2rem;
    background: rgba(250, 247, 242, 0.92);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid transparent;
    transition: border-color 0.3s ease, padding 0.3s ease;
  }
  header.scrolled { border-bottom-color: var(--color-line); padding: 0.9rem 2rem; }
  .nav-inner {
    max-width: var(--max-width);
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand { font-family: var(--font-serif-jp); font-size: 1.1rem; font-weight: 500; letter-spacing: 0.1em; }
  .brand rt { font-size: 0.55em; letter-spacing: 0.05em; font-weight: 400; }
  nav ul { list-style: none; display: flex; gap: 2.25rem; }
  nav a { font-family: var(--font-serif-en); font-size: 0.78rem; letter-spacing: 0.2em; color: var(--color-text); text-transform: uppercase; }
  nav a.current { color: var(--color-accent); }
  .menu-toggle { display: none; background: none; border: none; cursor: pointer; width: 32px; height: 24px; position: relative; }
  .menu-toggle span { position: absolute; left: 0; right: 0; height: 1px; background: var(--color-text); transition: all 0.3s ease; }
  .menu-toggle span:nth-child(1) { top: 4px; }
  .menu-toggle span:nth-child(2) { top: 12px; }
  .menu-toggle span:nth-child(3) { top: 20px; }
  .menu-toggle.open span:nth-child(1) { top: 12px; transform: rotate(45deg); }
  .menu-toggle.open span:nth-child(2) { opacity: 0; }
  .menu-toggle.open span:nth-child(3) { top: 12px; transform: rotate(-45deg); }

  /* ===== Btn ===== */
  .btn {
    display: inline-block;
    padding: 1rem 2.5rem;
    font-family: var(--font-serif-en);
    font-size: 0.9rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    border: 1px solid currentColor;
    background: transparent;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .btn-filled { background: var(--color-accent); color: #fff; border-color: var(--color-accent); }
  .btn-filled:hover { background: var(--color-accent-dark); border-color: var(--color-accent-dark); color: #fff; opacity: 1; }

  /* ===== Page Hero ===== */
  .page-hero {
    padding: 130px 2rem 5rem;
    background: var(--color-bg);
    text-align: center;
  }
  .section-eyebrow {
    font-family: var(--font-serif-en);
    font-size: 0.85rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--color-accent);
    margin-bottom: 1rem;
  }
  .section-title {
    font-family: var(--font-serif-en);
    font-size: clamp(2rem, 4vw, 2.8rem);
    font-weight: 400;
    margin-bottom: 1rem;
    letter-spacing: 0.02em;
  }
  .section-subtitle {
    color: var(--color-text-soft);
    max-width: 640px;
    margin: 0 auto;
    font-size: 0.95rem;
  }

  /* ===== Reviews Section ===== */
  .reviews-section {
    padding: 3rem 2rem 7rem;
    background: var(--color-bg);
  }
  .container { max-width: var(--max-width); margin: 0 auto; }

  /* Rating Summary */
  .rating-summary {
    text-align: center;
    margin-bottom: 4rem;
  }
  .rating-score-wrap {
    display: inline-flex;
    align-items: center;
    gap: 1.5rem;
    background: var(--color-bg-alt);
    padding: 1.5rem 3rem;
    border: 1px solid var(--color-line);
  }
  .rating-number {
    font-family: var(--font-serif-en);
    font-size: 4rem;
    font-weight: 400;
    color: var(--color-text);
    line-height: 1;
  }
  .rating-right { text-align: left; }
  .rating-stars { color: var(--color-accent); font-size: 1.3rem; letter-spacing: 0.1em; margin-bottom: 0.25rem; }
  .rating-count { font-size: 0.85rem; color: var(--color-text-soft); letter-spacing: 0.1em; }

  /* Reviews Grid */
  .reviews-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2rem;
  }
  .review-card {
    background: var(--color-bg-alt);
    padding: 2rem 1.75rem;
    position: relative;
    display: flex;
    flex-direction: column;
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .review-card.visible { opacity: 1; transform: translateY(0); }
  .review-card::before {
    content: '\201C';
    position: absolute;
    top: 10px; left: 18px;
    font-family: var(--font-serif-en);
    font-size: 4.5rem;
    line-height: 1;
    color: var(--color-accent);
    opacity: 0.25;
  }
  .review-stars { color: var(--color-accent); font-size: 0.9rem; letter-spacing: 0.1em; margin-bottom: 0.75rem; position: relative; z-index: 1; }
  .review-text {
    font-size: 0.88rem;
    color: var(--color-text-soft);
    line-height: 2;
    flex: 1;
    position: relative;
    z-index: 1;
  }
  .review-toggle {
    background: none;
    border: none;
    cursor: pointer;
    font-family: var(--font-serif-jp);
    font-size: 0.8rem;
    color: var(--color-accent);
    padding: 0.4rem 0;
    letter-spacing: 0.05em;
    display: block;
    margin-top: 0.5rem;
    position: relative;
    z-index: 1;
  }
  .review-toggle:hover { opacity: 0.7; }
  .review-date {
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--color-line);
    font-family: var(--font-serif-en);
    font-style: italic;
    color: var(--color-accent);
    font-size: 0.85rem;
    letter-spacing: 0.05em;
  }

  /* CTA */
  .reviews-cta {
    text-align: center;
    padding: 4rem 2rem;
    background: var(--color-bg-alt);
  }
  .reviews-cta p {
    color: var(--color-text-soft);
    margin-bottom: 2rem;
    font-size: 0.95rem;
  }

  /* ===== Footer ===== */
  footer {
    background: #3a332c;
    color: #d6cfc5;
    padding: 4rem 2rem 2rem;
    text-align: center;
  }
  .footer-brand { font-family: var(--font-serif-jp); font-size: 1.8rem; letter-spacing: 0.15em; color: #fff; margin-bottom: 0.5rem; }
  .footer-brand rt { font-size: 0.5em; letter-spacing: 0.05em; opacity: 0.8; }
  .footer-social { display: flex; justify-content: center; gap: 1.5rem; margin: 2rem 0; }
  .footer-social a {
    width: 40px; height: 40px;
    border: 1px solid #6b5f54;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #d6cfc5;
    transition: all 0.3s ease;
  }
  .footer-social a:hover { background: var(--color-accent); border-color: var(--color-accent); color: #fff; opacity: 1; }
  .footer-social svg { width: 18px; height: 18px; }
  .copyright { font-family: var(--font-serif-en); font-size: 0.8rem; letter-spacing: 0.2em; opacity: 0.6; padding-top: 2rem; border-top: 1px solid #5a5148; margin-top: 2rem; }

  /* ===== Responsive ===== */
  @media (max-width: 900px) {
    nav ul {
      position: fixed; top: 60px; left: 0; right: 0;
      background: rgba(250, 247, 242, 0.98);
      backdrop-filter: blur(10px);
      flex-direction: column; padding: 2rem; gap: 1.5rem;
      transform: translateY(-120%);
      transition: transform 0.4s ease;
      border-bottom: 1px solid var(--color-line);
    }
    nav ul.open { transform: translateY(0); }
    nav a { font-size: 1rem; letter-spacing: 0.08em; font-family: var(--font-serif-jp); }
    .menu-toggle { display: block; }
    .page-hero { padding: 100px 1.5rem 3rem; }
    .reviews-section { padding: 3rem 1.5rem 5rem; }
    .reviews-grid { grid-template-columns: repeat(2, 1fr); }
    .rating-score-wrap { padding: 1.25rem 2rem; }
  }
  @media (max-width: 500px) {
    .reviews-grid { grid-template-columns: 1fr; }
    .page-hero { padding: 90px 1.25rem 2.5rem; }
  }
</style>
</head>

  function renderStars(n) {
    return '★'.repeat(n) + '☆'.repeat(5 - n);
  }

  function formatDate(d) {
    const parts = d.split('/');
    return parts[0] + '年' + parseInt(parts[1]) + '月';
  }

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  const grid = document.getElementById('reviewsGrid');

  reviews.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'review-card';
    card.style.transitionDelay = (i % 3) * 0.1 + 's';

    const escaped = escapeHtml(r.text);
    const isLong = r.text.length > TRUNCATE;
    const shortText = isLong ? escapeHtml(r.text.slice(0, TRUNCATE)) + '…' : escaped;

    card.innerHTML = `
      <div class="review-stars">${renderStars(r.stars)}</div>
      <p class="review-text">${shortText}</p>
      ${isLong ? `<button class="review-toggle" aria-expanded="false">もっと見る</button>` : ''}
      <div class="review-date">${formatDate(r.date)}</div>
    `;

    if (isLong) {
      const toggle = card.querySelector('.review-toggle');
      const textEl = card.querySelector('.review-text');
      toggle.addEventListener('click', () => {
        const expanded = toggle.getAttribute('aria-expanded') === 'true';
        textEl.innerHTML = expanded ? shortText : escaped;
        toggle.textContent = expanded ? 'もっと見る' : '閉じる';
        toggle.setAttribute('aria-expanded', String(!expanded));
      });
    }

    grid.appendChild(card);
  });

  // Reveal on scroll
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
  }, { threshold: 0.1 });
  document.querySelectorAll('.review-card').forEach(el => observer.observe(el));

  // Header scroll
  const header = document.getElementById('header');
  window.addEventListener('scroll', () => { header.classList.toggle('scrolled', window.scrollY > 40); });

  // Mobile menu
  const toggle = document.getElementById('menuToggle');
  const navMenu = document.getElementById('navMenu');
  toggle.addEventListener('click', () => { toggle.classList.toggle('open'); navMenu.classList.toggle('open'); });
  navMenu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => { toggle.classList.remove('open'); navMenu.classList.remove('open'); }));
</script>
